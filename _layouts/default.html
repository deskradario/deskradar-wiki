<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}{% if page.title %} - {{ page.title }}{% endif %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
</head>
<body>
<nav>
  <div class="nav-burger">
    <button class="nav-toggle" aria-label="Menu" aria-expanded="false" onclick="const menu=this.nextElementSibling; const isOpen=menu.classList.toggle('open'); this.setAttribute('aria-expanded', isOpen)">
      <span></span><span></span><span></span>
    </button>
    <ul>
      <li><a href="{{ '/index.html' | relative_url }}"{% if page.nav == 'overview' %} class="active"{% endif %}>Overview</a></li>
      <li><a href="{{ '/configuration.html' | relative_url }}"{% if page.nav == 'configuration' %} class="active"{% endif %}>Configuration</a></li>
      <li><a href="{{ '/faq.html' | relative_url }}"{% if page.nav == 'faq' %} class="active"{% endif %}>FAQ</a></li>
      <li><a href="{{ '/architecture.html' | relative_url }}"{% if page.nav == 'architecture' %} class="active"{% endif %}>Architecture</a></li>
      <li><a href="{{ '/source.html' | relative_url }}"{% if page.nav == 'source' %} class="active"{% endif %}>Source</a></li>
      <li><a href="{{ '/installation.html' | relative_url }}"{% if page.nav == 'installation' %} class="active"{% endif %}>Installation</a></li>
      <li><a href="{{ '/bill_of_materials.html' | relative_url }}"{% if page.nav == 'bom' %} class="active"{% endif %}>Bill of Materials</a></li>
      <li><a href="{{ '/updates.html' | relative_url }}"{% if page.nav == 'updates' or page.collection == 'posts' %} class="active"{% endif %}>Updates</a></li>
      <li><a href="{{ '/guides.html' | relative_url }}"{% if page.nav == 'guides' or page.collection == 'guides' %} class="active"{% endif %}>Guides</a></li>
      <li><a href="{{ '/stores.html' | relative_url }}"{% if page.nav == 'stores' %} class="active"{% endif %}>Stores</a></li>
      <li><a href="https://trello.com/b/1DyW16cA/deskradar64" target="_blank" rel="noopener noreferrer">Feature &amp; Bug Board</a></li>
    </ul>
  </div>
</nav>
<div class="container">
  {{ content }}
</div>
</body>
</html>
